<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKA PUTRA FC</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0d2b45,#1e4e79);
}

header {
  text-align:center;
  padding:30px;
  color:white;
}

header img {
  width:100px;
}

.container {
  max-width:1100px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.filter-box {
  text-align:center;
  margin-bottom:20px;
}

.filter-box input {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.admin-panel {
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn-wa { background:#25D366; color:white; }

table {
  border-collapse:collapse;
  min-width:800px;
}

th {
  background:#1e4e79;
  color:white;
}

th, td {
  padding:12px;
  text-align:center;
  border:1px solid #ddd;
}

.available {
  background:#e6f9ec;
}

.booked {
  background:#ffe6e6;
  color:#dc3545;
  font-weight:bold;
}

.table-wrapper {
  overflow-x:auto;
}
</style>
</head>

<body>

<header>
  <img src="logo.jpeg">
  <h2>EKA PUTRA FC ⚽</h2>
  <p>Booking Lapangan Online</p>
  <p>Kp. Manggis Hilir RW 03, Desa Benda, Sukabumi</p>
</header>

<div class="container">

<div class="filter-box">
  <h3>Pilih Tanggal</h3>
  <input type="date" id="filterTanggal">
</div>

<div id="adminPanel" class="admin-panel" style="display:none;">
  <h3>Admin Panel</h3>
  <input type="text" id="nama" placeholder="Nama Tim">
  <select id="jam"></select>
  <button onclick="booking()">Tambah</button>
</div>

<div class="table-wrapper">
<table>
<tbody id="jadwal"></tbody>
</table>
</div>

</div>

<script>

const adminPassword = "12345";
let isAdmin = false;

if(window.location.search.includes("admin")){
  let pass = prompt("Password admin:");
  if(pass === adminPassword){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyCcdLLQ2u1ggm58Se30DSqXqUhfYR1ZnjE",
  authDomain: "ekaputrafc-68823.firebaseapp.com",
  projectId: "ekaputrafc-68823"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const times = ["07:00-11:00","11:00-14:00","14:00-18:00"];
const jadwalEl = document.getElementById("jadwal");
const jamSelect = document.getElementById("jam");
const filterTanggal = document.getElementById("filterTanggal");

times.forEach(j=>{
  let o=document.createElement("option");
  o.value=j;
  o.textContent=j;
  jamSelect.appendChild(o);
});

function getDays(startDate){
  let days = [];
  let base = new Date(startDate);

  for(let i=0;i<7;i++){
    let d = new Date(base);
    d.setDate(base.getDate() + i);
    days.push(d.toISOString().split("T")[0]);
  }

  return days;
}

function loadData(){

let startDate = filterTanggal.value;
let days = getDays(startDate);

db.collection("bookings").onSnapshot(snapshot=>{

let html = "<tr><th>Jam</th>";

days.forEach(tanggal=>{
  html += `<th>${new Date(tanggal).toLocaleDateString("id-ID")}</th>`;
});

html += "</tr>";

times.forEach(jam=>{

  html += `<tr><td><b>${jam}</b></td>`;

  days.forEach(tanggal=>{

    let found=null;

    snapshot.forEach(doc=>{
      let d=doc.data();
      if(d.jam===jam && d.tanggal===tanggal){
        found=d;
      }
    });

    if(found){
      html += `<td class="booked">Booked</td>`;
    }else{
      html += `<td class="available">
      <a href="https://wa.me/6281563630245?text=Halo%20saya%20ingin%20booking%20lapangan%0ATanggal:%20${tanggal}%0AJam:%20${jam}%0AHarga:%20Rp150.000" target="_blank">
      <button class="btn-wa">Booking</button></a>
      </td>`;
    }

  });

  html += "</tr>";

});

jadwalEl.innerHTML = html;

});
}

filterTanggal.value = new Date().toISOString().split("T")[0];
filterTanggal.addEventListener("change", loadData);

loadData();

function booking(){
let nama=document.getElementById("nama").value;
let jam=document.getElementById("jam").value;
let tanggal = filterTanggal.value;

db.collection("bookings").add({nama,tanggal,jam});
}

</script>

</body>
</html>
