<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKA PUTRA FC</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0d2b45,#1e4e79);
}

header {
  text-align:center;
  padding:30px;
  color:white;
}

header img {
  width:100px;
}

.container {
  max-width:1000px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.filter-box {
  text-align:center;
  margin-bottom:20px;
}

.admin-panel {
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn-wa { background:#25D366; color:white; }
.btn-delete { background:#dc3545; color:white; }
.btn-confirm { background:#ffc107; }

table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#1e4e79;
  color:white;
}

th, td {
  padding:12px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

.available { color:#28a745; font-weight:bold; }
.booked { color:#dc3545; font-weight:bold; }

</style>
</head>

<body>

<header>
  <img src="logo.jpeg">
  <h2>EKA PUTRA FC ⚽</h2>
  <p>Booking Lapangan Online</p>
  <p>Kp. Manggis Hilir RW 03, Desa Benda, Sukabumi</p>
</header>

<div class="container">

<div class="filter-box">
  <h3>Jadwal Mingguan</h3>
  <button onclick="prevWeek()">⬅️</button>
  <span id="rangeTanggal"></span>
  <button onclick="nextWeek()">➡️</button>
</div>

<div id="adminPanel" class="admin-panel" style="display:none;">
  <h3>Admin Panel</h3>
  <input type="text" id="nama" placeholder="Nama Tim">
  <select id="jam"></select>
  <button onclick="booking()">Tambah</button>
</div>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="jadwal"></tbody>
</table>

</div>

<script>

const adminPassword = "12345";
let isAdmin = false;

if(window.location.search.includes("admin")){
  let pass = prompt("Password admin:");
  if(pass === adminPassword){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyCcdLLQ2u1ggm58Se30DSqXqUhfYR1ZnjE",
  authDomain: "ekaputrafc-68823.firebaseapp.com",
  projectId: "ekaputrafc-68823"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentDate = new Date();

const times = ["07:00-11:00","11:00-14:00","14:00-18:00"];
const jadwalEl = document.getElementById("jadwal");
const jamSelect = document.getElementById("jam");

times.forEach(j=>{
  let o=document.createElement("option");
  o.value=j;
  o.textContent=j;
  jamSelect.appendChild(o);
});

function getWeekDates(date){
  let start = new Date(date);
  start.setDate(start.getDate() - start.getDay());

  let days = [];
  for(let i=0;i<7;i++){
    let d = new Date(start);
    d.setDate(start.getDate()+i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

function updateRangeText(week){
  document.getElementById("rangeTanggal").innerText =
    new Date(week[0]).toLocaleDateString("id-ID") +
    " - " +
    new Date(week[6]).toLocaleDateString("id-ID");
}

function loadData(){

let week = getWeekDates(currentDate);
updateRangeText(week);

db.collection("bookings").onSnapshot(snapshot=>{
jadwalEl.innerHTML="";

week.forEach(tanggal=>{

  times.forEach(jam=>{

    let found=null;

    snapshot.forEach(doc=>{
      let d=doc.data();
      if(d.jam===jam && d.tanggal===tanggal){
        found={...d,id:doc.id};
      }
    });

    let status="Kosong";
    let classStatus="available";
    let aksi="";

    if(found){
      status="Booked - "+found.nama;
      classStatus="booked";

      if(isAdmin){
        aksi=`<button class="btn-delete" onclick="hapus('${found.id}')">Hapus</button>`;
      }else{
        aksi=`<button disabled>Booked</button>`;
      }

    }else{

      if(isAdmin){
        aksi=`<button class="btn-confirm" onclick="quickBooking('${jam}','${tanggal}')">Konfirmasi</button>`;
      }else{
        aksi=`<a href="https://wa.me/6281563630245?text=Booking%20Lapangan%20Eka%20Putra%20FC%0ATanggal:%20${tanggal}%0AJam:%20${jam}%0AHarga:%20Rp150.000" target="_blank">
        <button class="btn-wa">Booking</button></a>`;
      }

    }

    let row=document.createElement("tr");
    row.innerHTML=`
      <td>${new Date(tanggal).toLocaleDateString("id-ID")}</td>
      <td>${jam}</td>
      <td class="${classStatus}">${status}</td>
      <td>${aksi}</td>
    `;

    jadwalEl.appendChild(row);

  });

});

});
}

loadData();

function booking(){
let nama=document.getElementById("nama").value;
let jam=document.getElementById("jam").value;
let tanggal = getWeekDates(currentDate)[0];

db.collection("bookings").add({nama,tanggal,jam});
}

function quickBooking(jam, tanggal){
  let nama = prompt("Nama tim?");
  if(!nama) return;

  db.collection("bookings").add({nama,tanggal,jam});
}

function hapus(id){
db.collection("bookings").doc(id).delete();
}

function nextWeek(){
  currentDate.setDate(currentDate.getDate()+7);
  loadData();
}

function prevWeek(){
  currentDate.setDate(currentDate.getDate()-7);
  loadData();
}

</script>

</body>
</html>
