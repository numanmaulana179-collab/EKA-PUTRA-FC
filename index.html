<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eka Putra FC</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#eef2f7; margin:0;}
header {background:#1e4e79;color:white;text-align:center;padding:20px;}
.container{padding:20px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;}
th{background:#1e4e79;color:white;}
.available{background:#d4edda;}
.booked{background:#f8d7da;}
button{padding:8px 12px;border:none;border-radius:5px;cursor:pointer;}
.wa{background:#25D366;color:white;}
.admin{background:#1e4e79;color:white;}
</style>
</head>

<body>

<header>
<h2>Eka Putra FC ⚽</h2>
<p>Booking Lapangan</p>
</header>

<div class="container">

<!-- FILTER TANGGAL -->
<h3>Pilih Tanggal</h3>
<input type="date" id="filterTanggal">

<br><br>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
<h3>ADMIN PANEL</h3>
<input type="text" id="nama" placeholder="Nama Tim">
<input type="date" id="tanggal">
<select id="jam"></select>
<button class="admin" onclick="booking()">Tambah Booking</button>
</div>

<br>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="jadwal"></tbody>
</table>

</div>

<script>

// 🔐 PASSWORD ADMIN
const adminPassword = "12345";

// 🔥 MODE ADMIN
let isAdmin = false;
if(window.location.search.includes("admin")){
  let pass = prompt("Masukkan password admin");
  if(pass === adminPassword){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
  }
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCcdLLQ2u1ggm58Se30DSqXqUhfYR1ZnjE",
  authDomain: "ekaputrafc-68823.firebaseapp.com",
  projectId: "ekaputrafc-68823"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const times = ["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];

const jadwalEl = document.getElementById("jadwal");
const jamSelect = document.getElementById("jam");
const filterTanggal = document.getElementById("filterTanggal");

// isi jam dropdown
times.forEach(j=>{
let o=document.createElement("option");
o.value=j;o.textContent=j;
jamSelect.appendChild(o);
});

// realtime + filter tanggal
function loadData(){
let selectedTanggal = filterTanggal.value;

db.collection("bookings").onSnapshot(snapshot=>{
jadwalEl.innerHTML="";

times.forEach(jam=>{
let found=null;

snapshot.forEach(doc=>{
let d=doc.data();
if(d.jam===jam && d.tanggal===selectedTanggal){
found={...d,id:doc.id};
}
});

let status="Kosong";
let classStatus="available";
let aksi="";

if(found){
status=found.nama;
classStatus="booked";

if(isAdmin){
aksi=`<button onclick="hapus('${found.id}')">Hapus</button>`;
}else{
aksi=`<a href="https://wa.me/6281563630245?text=Halo%20saya%20ingin%20booking%20lapangan%20tanggal%20${selectedTanggal}%20jam%20${jam}" target="_blank"><button class="wa">WA</button></a>`;
}

}else{
aksi=`<a href="https://wa.me/6281563630245?text=Halo%20saya%20ingin%20booking%20lapangan%20tanggal%20${selectedTanggal}%20jam%20${jam}" target="_blank"><button class="wa">Booking</button></a>`;
}

let row=document.createElement("tr");
row.innerHTML=`
<td>${selectedTanggal ? new Date(selectedTanggal).toLocaleDateString("id-ID") : "-"}</td>
<td>${jam}</td>
<td class="${classStatus}">${status}</td>
<td>${aksi}</td>
`;

jadwalEl.appendChild(row);

});

});
}

// event pilih tanggal
filterTanggal.addEventListener("change", loadData);

// tambah booking
function booking(){
let nama=document.getElementById("nama").value;
let tanggal=document.getElementById("tanggal").value;
let jam=document.getElementById("jam").value;

if(!tanggal){
alert("Pilih tanggal dulu!");
return;
}

db.collection("bookings").add({nama,tanggal,jam});
}

// hapus booking
function hapus(id){
db.collection("bookings").doc(id).delete();
}

</script>

</body>
</html>
