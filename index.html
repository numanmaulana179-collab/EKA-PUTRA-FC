<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKA PUTRA FC</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0d2b45,#1e4e79);
  color:#333;
}

header {
  text-align:center;
  padding:30px;
  color:white;
}

header img {
  width:100px;
  margin-bottom:10px;
}

.container {
  max-width:1000px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin:0;
}

.filter-box {
  text-align:center;
  margin-bottom:20px;
}

input[type="date"] {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.admin-panel {
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.admin-panel input, .admin-panel select {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn-admin {
  background:#1e4e79;
  color:white;
}

.btn-wa {
  background:#25D366;
  color:white;
}

.btn-delete {
  background:#dc3545;
  color:white;
}

.btn-confirm {
  background:#ffc107;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th {
  background:#1e4e79;
  color:white;
}

th, td {
  padding:12px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

.available {
  color:#28a745;
  font-weight:bold;
}

.booked {
  color:#dc3545;
  font-weight:bold;
}

tr:hover {
  background:#f9f9f9;
}
</style>
</head>

<body>

<header>
  <img src="logo.jpeg">
  <h2>EKA PUTRA FC ⚽</h2>
  <p>Booking Lapangan Online</p>
  <p>Kp. Manggis Hilir RW 03, Des. Benda, Kec. Cicurug, Kab. Sukabumi</p>
</header>

<div class="container">

<div class="filter-box">
  <h3>Pilih Tanggal</h3>
  <input type="date" id="filterTanggal">
</div>

<div id="adminPanel" class="admin-panel" style="display:none;">
  <h3>Admin Panel</h3>
  <input type="text" id="nama" placeholder="Nama Tim">
  <input type="date" id="tanggal">
  <select id="jam"></select>
  <button class="btn-admin" onclick="booking()">Tambah</button>
</div>

<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jam</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="jadwal"></tbody>
</table>

</div>

<script>

const adminPassword = "12345";

let isAdmin = false;
if(window.location.search.includes("admin")){
  let pass = prompt("Password admin:");
  if(pass === adminPassword){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyCcdLLQ2u1ggm58Se30DSqXqUhfYR1ZnjE",
  authDomain: "ekaputrafc-68823.firebaseapp.com",
  projectId: "ekaputrafc-68823"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const times = ["07:00-11:00","11:00-14:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];

const jadwalEl = document.getElementById("jadwal");
const jamSelect = document.getElementById("jam");
const filterTanggal = document.getElementById("filterTanggal");

times.forEach(j=>{
  let o=document.createElement("option");
  o.value=j;o.textContent=j;
  jamSelect.appendChild(o);
});

// default hari ini
filterTanggal.value = new Date().toISOString().split("T")[0];

function loadData(){
let selectedTanggal = filterTanggal.value;

db.collection("bookings").onSnapshot(snapshot=>{
jadwalEl.innerHTML="";

times.forEach(jam=>{
let found=null;

snapshot.forEach(doc=>{
let d=doc.data();
if(d.jam===jam && d.tanggal===selectedTanggal){
found={...d,id:doc.id};
}
});

let status="Kosong";
let classStatus="available";
let aksi="";

if(found){
status="Booked - "+found.nama;
classStatus="booked";

if(isAdmin){
aksi=`<button class="btn-delete" onclick="hapus('${found.id}')">Hapus</button>`;
}else{
aksi=`<button disabled>Booked</button>`;
}

}else{

if(isAdmin){
aksi=`<button class="btn-confirm" onclick="quickBooking('${jam}')">Konfirmasi</button>`;
}else{
aksi=`<a href="https://wa.me/6281563630245?text=Halo%20saya%20ingin%20booking%20lapangan%20tanggal%20${selectedTanggal}%20jam%20${jam}" target="_blank">
<button class="btn-wa">Booking</button></a>`;
}

}

let row=document.createElement("tr");
row.innerHTML=`
<td>${new Date(selectedTanggal).toLocaleDateString("id-ID")}</td>
<td>${jam}</td>
<td class="${classStatus}">${status}</td>
<td>${aksi}</td>
`;

jadwalEl.appendChild(row);

});

});
}

filterTanggal.addEventListener("change", loadData);
loadData();

function booking(){
let nama=document.getElementById("nama").value;
let tanggal=document.getElementById("tanggal").value;
let jam=document.getElementById("jam").value;

db.collection("bookings").add({nama,tanggal,jam});
}

function quickBooking(jam){
let nama = prompt("Nama tim?");
let tanggal = filterTanggal.value;

if(!nama) return;

db.collection("bookings").add({nama,tanggal,jam});
}

function hapus(id){
db.collection("bookings").doc(id).delete();
}

</script>

</body>
</html>
